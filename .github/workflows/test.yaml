name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: 'recursive'

      - name: Clone avmpolicytester
        run: |
          git clone https://github.com/lonegunmanb/avmpolicytester.git /tmp/avmpolicytester
      
      - name: Clone conftest # We need opa's go.mod to learn opa's go version
        run: |
          git clone --depth=1 https://github.com/open-policy-agent/conftest.git /tmp/conftest

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
        with:
          go-version-file: /tmp/conftest/go.mod
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 #v2.4.0
        with:
          version: latest

      - name: Install conftest
        working-directory: /tmp/conftest
        run: CGO_ENABLED=0 go install
      - name: Run utils tests
        run: |
          echo `opa version`
          target="./policy/common"
          echo $target
          set -o pipefail
          opa test $target -v || exit 1
          coverage_json=$(opa test --coverage --format=json $target -v)
          coverage=$(echo $coverage_json | jq '.coverage')
          echo "Coverage: $coverage"

          if [ "$coverage" != "100" ]; then
            echo $coverage_json | jq
            printf "\n\e[0;31mRule test coverage must be 100%%\e[0m\n"
            exit 1
          fi;
      - name: Run tests
        run: |
          export POLICY_DIR="$(pwd)/policy"
          export UTILS_REGO="$(pwd)/policy/common"
          cd /tmp/avmpolicytester
          go test -v github.com/lonegunmanb/avmpolicytester/...